timeout: 1800s

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'node:20'
    id: install
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm ci

  - name: 'node:20'
    id: typecheck
    waitFor: ['install']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm run typecheck

  - name: 'node:20'
    id: build-main
    waitFor: ['typecheck']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm run build

  - name: 'electronuserland/builder:wine-mono'
    id: dist-all-platforms
    waitFor: ['build-main']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        # Cross-compile linux + windows + mac (unsigned zip) from Linux.
        # Mac DMG requires a macOS host; mac zip is the cross-compilable target.
        npx electron-builder --linux --win --mac --x64 --arm64 \
          --config.extraMetadata.commit=$COMMIT_SHA \
          --publish never
        ls -la release/

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish
    waitFor: ['dist-all-platforms']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        SHORT="$(echo "$COMMIT_SHA" | cut -c1-7)"
        published=0
        for f in release/*.AppImage release/*.deb release/*.exe release/*-mac.zip; do
          [ -e "$f" ] || continue
          base="$(basename "$f")"
          gcloud storage cp "$f" "gs://relayone-488319-public/relaygate-desktop/$SHORT/$base"
          gcloud storage cp "$f" "gs://relayone-488319-public/relaygate-desktop/latest/$base"
          sha256sum "$f" | tee -a release/SHA256SUMS.txt
          published=$((published + 1))
        done
        if [ "$published" -lt 5 ]; then
          echo "ERROR: expected at least 5 artifacts (linux x2, mac x2, win), got $published" >&2
          exit 1
        fi
        gcloud storage cp release/SHA256SUMS.txt "gs://relayone-488319-public/relaygate-desktop/$SHORT/SHA256SUMS.txt"
        gcloud storage cp release/SHA256SUMS.txt "gs://relayone-488319-public/relaygate-desktop/latest/SHA256SUMS.txt"
        gcloud storage ls "gs://relayone-488319-public/relaygate-desktop/$SHORT/"

artifacts:
  objects:
    location: 'gs://relayone-488319-public/relaygate-desktop/build-$BUILD_ID/'
    paths:
      - 'release/*.AppImage'
      - 'release/*.deb'
      - 'release/*.exe'
      - 'release/*-mac.zip'
      - 'release/SHA256SUMS.txt'
