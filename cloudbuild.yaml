timeout: 3600s

substitutions:
  # _ENV namespaces published artifacts by environment so dev/staging/prod
  # builds don't share the GCS path. Default 'prod' so the existing
  # relaygate-desktop-binaries (push to main) trigger keeps working
  # unchanged. Dev/staging triggers override via --substitutions=_ENV=...
  # See specs/cloudbuild-env-paths.md for the full path scheme.
  _ENV: 'prod'

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'node:20'
    id: install
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm ci

  - name: 'node:20'
    id: typecheck
    waitFor: ['install']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm run typecheck

  - name: 'node:20'
    id: build-main
    waitFor: ['typecheck']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm run build

  - name: 'node:20'
    id: smoke-test
    waitFor: ['build-main']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        # Headless-Electron smoke test (Puppeteer-CDP attach against the live
        # dashboard). Catches Electron-upgrade regressions and dashboard-side
        # JS breakage before we waste cycles on the 5-platform cross-compile.
        # Couples CI reliability to app.relaygate.ai uptime — that's a known
        # tradeoff documented in docs/FEATURE-MAP.md (Testing > CI-integrated).
        # Retry up to 3x with backoff to absorb transient network/dashboard
        # flake without making the step fail-closed on intermittent 500s.

        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq

        # Chromium runtime deps + xvfb for headless display
        apt-get install -y -qq --fix-missing \
          xvfb \
          libgtk-3-0 libgbm1 libnss3 libasound2 libxss1 libxshmfence1 \
          libcups2 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
          libpango-1.0-0 libcairo2 libatk-bridge2.0-0 libatk1.0-0 \
          libxkbcommon0 fonts-liberation > /dev/null 2>&1

        # Smoke test starts an Electron with --remote-debugging-port and
        # attaches via CDP. SUID sandbox needs root; --no-sandbox is set in
        # tests/smoke.test.ts. ELECTRON_DISABLE_SANDBOX is belt-and-suspenders.
        export ELECTRON_DISABLE_SANDBOX=1

        attempt=0
        until xvfb-run -a --server-args="-screen 0 1280x1024x24" npm run test:smoke; do
          attempt=$((attempt + 1))
          if [ "$attempt" -ge 3 ]; then
            echo "ERROR: smoke test failed 3 times" >&2
            ls -la tests/artifacts/ || true
            exit 1
          fi
          echo "smoke attempt $attempt failed, retrying in 15s..."
          sleep 15
        done
        echo "✓ smoke test passed on attempt $((attempt + 1))"
        ls -la tests/artifacts/ || true

  - name: 'electronuserland/builder:wine-mono'
    id: dist-all-platforms
    waitFor: ['smoke-test']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        # Cross-compile linux + windows + mac (unsigned zip) from Linux.
        # mac.dmg is built in the next step (build-mac-dmg) using
        # libdmg-hfsplus from source, since electron-builder's DMG path
        # requires hdiutil (macOS-only).
        npx electron-builder --linux --win --mac --x64 --arm64 \
          --config.extraMetadata.commit=$COMMIT_SHA \
          --config.extraMetadata.env=${_ENV} \
          --publish never
        ls -la release/

  - name: 'ubuntu:22.04'
    id: build-mac-dmg
    waitFor: ['dist-all-platforms']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        export DEBIAN_FRONTEND=noninteractive
        # Retry apt up to 3x with --fix-missing — Ubuntu archive mirrors
        # flake intermittently (PR build ad85669c failed on transient
        # "Unable to fetch some archives"). Manual /gcbrun retry unreliable
        # for this trigger, so make the install itself self-healing.
        attempt=0
        until apt-get update -qq && apt-get install -y -qq --fix-missing \
            git cmake build-essential libssl-dev libbz2-dev \
            zlib1g-dev unzip hfsprogs file; do
          attempt=$$((attempt + 1))
          if [ "$$attempt" -ge 3 ]; then
            echo "ERROR: apt failed 3 times" >&2; exit 1
          fi
          echo "apt attempt $$attempt failed, retrying in 10s..."
          sleep 10
        done

        cd /tmp
        # Mozilla fork ships both `dmg` (UDIF writer) and `hfsplus` (userspace
        # HFS+ writer that does NOT require kernel hfsplus module — Cloud Build
        # containers don't have it loaded). The fanquake fork only ships `dmg`.
        git clone --depth=1 https://github.com/mozilla/libdmg-hfsplus
        cmake -S libdmg-hfsplus -B libdmg-hfsplus/build > /dev/null
        make -C libdmg-hfsplus/build -j$$(nproc) > /dev/null
        DMG_BIN=/tmp/libdmg-hfsplus/build/dmg/dmg
        HFS_BIN=/tmp/libdmg-hfsplus/build/hfs/hfsplus

        cd /workspace

        build_dmg() {
          local zip_file="release/$$1" arch_label="$$2"
          local out_dmg="release/RelayGate-0.1.0-$${arch_label}.dmg"
          local extract_dir="/tmp/extract-$${arch_label}"
          mkdir -p "$$extract_dir"
          unzip -oq "$$zip_file" -d "$$extract_dir"
          local app_dir
          app_dir=$$(find "$$extract_dir" -maxdepth 1 -type d -name "*.app" | head -1)
          [ -z "$$app_dir" ] && { echo "no .app in $$zip_file"; return 1; }
          local size_mb
          # HFS+ via mozilla hfsplus userspace addall has overhead beyond
          # the directory size — using 3x + 200MB buffer to avoid allocation
          # failures on large Electron Framework binaries.
          size_mb=$$(du -sm "$$app_dir" | awk "{print int(\$$1 * 3) + 200}")
          local img="/tmp/$${arch_label}.img"
          dd if=/dev/zero of="$$img" bs=1M count=$$size_mb status=none
          mkfs.hfsplus -v "RelayGate" "$$img" > /dev/null
          # Userspace add — no mount needed.
          $$HFS_BIN "$$img" addall "$$app_dir"
          # Mozilla fork's dmg CLI takes a subcommand: `dmg dmg <iso> <dmg>`.
          $$DMG_BIN dmg "$$img" "$$out_dmg" 2>&1 | tail -3
          ls -la "$$out_dmg"
          rm -rf "$$extract_dir" "$$img"
        }

        build_dmg "RelayGate-0.1.0-x64-mac.zip" x64
        build_dmg "RelayGate-0.1.0-arm64-mac.zip" arm64
        ls -la release/*.dmg

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: smoke-test-win
    waitFor: ['dist-all-platforms']
    entrypoint: bash
    args:
      - -euc
      - |
        # Cross-platform Windows smoke. Provisions an ephemeral GCE Windows
        # Server 2022 VM via scripts/win-smoke.sh, runs the cross-compiled
        # nsis installer + Puppeteer-CDP smoke, tears down the VM. Runs in
        # parallel with build-mac-dmg; publish.waitFor includes both.
        # See specs/cross-platform-smoke.md TASK-1/2/3 + Path B authorization
        # 2026-05-05. SA roles/compute.instanceAdmin.v1 was granted in commit
        # a6f835a as part of this rollout.
        #
        # Cloud Build substitutions (PROJECT_ID, SHORT_SHA, COMMIT_SHA, _ENV)
        # are NOT auto-exported to the bash env; they're only available via
        # direct $$VAR substitution at YAML-parse time. Pass them through as
        # explicit exports so the script (which uses `set -u`) sees them.
        export PROJECT_ID="$PROJECT_ID"
        export SHORT_SHA="$SHORT_SHA"
        export COMMIT_SHA="$COMMIT_SHA"
        export _ENV="${_ENV}"
        bash scripts/win-smoke.sh

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish
    waitFor: ['build-mac-dmg', 'smoke-test-win']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        # Per-environment artifact paths. The trigger sets _ENV via
        # substitutions (prod/staging/dev); default 'prod' lets the existing
        # main push trigger work unchanged. Path scheme:
        #   {ENV}/{SHORT_SHA}/   — immutable per-build
        #   {ENV}/latest/         — mutable env mirror (skipped on PR builds)
        #   latest/               — legacy prod mirror, ONLY when _ENV=prod,
        #                           kept for backward-compat with the landing
        #                           page links until those migrate to /prod/latest/.
        # See specs/cloudbuild-env-paths.md for the full design.
        #
        # PR-mode detection: $TRIGGER_NAME starts with "relaygate-desktop-pr"
        # (covers prod -pr, -pr-dev, -pr-staging). PR builds publish only to
        # the per-build path; no env mirror, no legacy mirror.
        IS_PR_BUILD=false
        if [[ "$TRIGGER_NAME" == relaygate-desktop-pr* ]]; then
          IS_PR_BUILD=true
          echo "PR build detected ($TRIGGER_NAME) — skipping latest/ mirrors"
        fi
        published=0
        for f in release/*.AppImage release/*.deb release/*.exe release/*-mac.zip release/*.dmg; do
          [ -e "$$f" ] || continue
          base="$$(basename "$$f")"
          gcloud storage cp "$$f" "gs://relayone-488319-public/relaygate-desktop/${_ENV}/$SHORT_SHA/$$base"
          if [ "$$IS_PR_BUILD" != "true" ]; then
            gcloud storage cp "$$f" "gs://relayone-488319-public/relaygate-desktop/${_ENV}/latest/$$base"
            if [ "${_ENV}" = "prod" ]; then
              gcloud storage cp "$$f" "gs://relayone-488319-public/relaygate-desktop/latest/$$base"
            fi
          fi
          sha256sum "$$f" | tee -a release/SHA256SUMS.txt
          published=$$((published + 1))
        done
        if [ "$$published" -lt 7 ]; then
          echo "ERROR: expected at least 7 artifacts (linux x4, mac.zip x2, mac.dmg x2, win), got $$published" >&2
          exit 1
        fi
        gcloud storage cp release/SHA256SUMS.txt "gs://relayone-488319-public/relaygate-desktop/${_ENV}/$SHORT_SHA/SHA256SUMS.txt"
        if [ "$$IS_PR_BUILD" != "true" ]; then
          gcloud storage cp release/SHA256SUMS.txt "gs://relayone-488319-public/relaygate-desktop/${_ENV}/latest/SHA256SUMS.txt"
          if [ "${_ENV}" = "prod" ]; then
            gcloud storage cp release/SHA256SUMS.txt "gs://relayone-488319-public/relaygate-desktop/latest/SHA256SUMS.txt"
          fi
        fi
        gcloud storage ls "gs://relayone-488319-public/relaygate-desktop/${_ENV}/$SHORT_SHA/"

artifacts:
  objects:
    location: 'gs://relayone-488319-public/relaygate-desktop/build-$BUILD_ID/'
    paths:
      - 'release/*.AppImage'
      - 'release/*.deb'
      - 'release/*.exe'
      - 'release/*-mac.zip'
      - 'release/*.dmg'
      - 'release/SHA256SUMS.txt'
      - 'tests/artifacts/*.png'
      - 'tests/artifacts/*.json'
      - 'tests/artifacts/*.log'
