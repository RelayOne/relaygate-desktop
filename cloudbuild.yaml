timeout: 1800s

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'node:20'
    id: install
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm ci

  - name: 'node:20'
    id: typecheck
    waitFor: ['install']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm run typecheck

  - name: 'node:20'
    id: build-main
    waitFor: ['typecheck']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        npm run build

  - name: 'electronuserland/builder:wine-mono'
    id: dist-all-platforms
    waitFor: ['build-main']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        # Cross-compile linux + windows + mac (unsigned zip) from Linux.
        # mac.dmg is built in the next step (build-mac-dmg) using
        # libdmg-hfsplus from source, since electron-builder's DMG path
        # requires hdiutil (macOS-only).
        npx electron-builder --linux --win --mac --x64 --arm64 \
          --config.extraMetadata.commit=$COMMIT_SHA \
          --publish never
        ls -la release/

  - name: 'ubuntu:22.04'
    id: build-mac-dmg
    waitFor: ['dist-all-platforms']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y -qq git cmake build-essential libssl-dev libbz2-dev \
          zlib1g-dev unzip hfsprogs file 2>&1 | tail -1

        cd /tmp
        # Mozilla fork ships both `dmg` (UDIF writer) and `hfsplus` (userspace
        # HFS+ writer that does NOT require kernel hfsplus module — Cloud Build
        # containers don't have it loaded). The fanquake fork only ships `dmg`.
        git clone --depth=1 https://github.com/mozilla/libdmg-hfsplus
        cmake -S libdmg-hfsplus -B libdmg-hfsplus/build > /dev/null
        make -C libdmg-hfsplus/build -j$$(nproc) > /dev/null
        DMG_BIN=/tmp/libdmg-hfsplus/build/dmg/dmg
        HFS_BIN=/tmp/libdmg-hfsplus/build/hfs/hfsplus

        cd /workspace

        build_dmg() {
          local zip_file="release/$$1" arch_label="$$2"
          local out_dmg="release/RelayGate-0.1.0-$${arch_label}.dmg"
          local extract_dir="/tmp/extract-$${arch_label}"
          mkdir -p "$$extract_dir"
          unzip -oq "$$zip_file" -d "$$extract_dir"
          local app_dir
          app_dir=$$(find "$$extract_dir" -maxdepth 1 -type d -name "*.app" | head -1)
          [ -z "$$app_dir" ] && { echo "no .app in $$zip_file"; return 1; }
          local size_mb
          # HFS+ via mozilla hfsplus userspace addall has overhead beyond
          # the directory size — using 3x + 200MB buffer to avoid allocation
          # failures on large Electron Framework binaries.
          size_mb=$$(du -sm "$$app_dir" | awk "{print int(\$$1 * 3) + 200}")
          local img="/tmp/$${arch_label}.img"
          dd if=/dev/zero of="$$img" bs=1M count=$$size_mb status=none
          mkfs.hfsplus -v "RelayGate" "$$img" > /dev/null
          # Userspace add — no mount needed.
          $$HFS_BIN "$$img" addall "$$app_dir"
          # Mozilla fork's dmg CLI takes a subcommand: `dmg dmg <iso> <dmg>`.
          $$DMG_BIN dmg "$$img" "$$out_dmg" 2>&1 | tail -3
          ls -la "$$out_dmg"
          rm -rf "$$extract_dir" "$$img"
        }

        build_dmg "RelayGate-0.1.0-x64-mac.zip" x64
        build_dmg "RelayGate-0.1.0-arm64-mac.zip" arm64
        ls -la release/*.dmg

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish
    waitFor: ['build-mac-dmg']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        published=0
        for f in release/*.AppImage release/*.deb release/*.exe release/*-mac.zip release/*.dmg; do
          [ -e "$$f" ] || continue
          base="$$(basename "$$f")"
          gcloud storage cp "$$f" "gs://relayone-488319-public/relaygate-desktop/$SHORT_SHA/$$base"
          gcloud storage cp "$$f" "gs://relayone-488319-public/relaygate-desktop/latest/$$base"
          sha256sum "$$f" | tee -a release/SHA256SUMS.txt
          published=$$((published + 1))
        done
        if [ "$$published" -lt 7 ]; then
          echo "ERROR: expected at least 7 artifacts (linux x4, mac.zip x2, mac.dmg x2, win), got $$published" >&2
          exit 1
        fi
        gcloud storage cp release/SHA256SUMS.txt "gs://relayone-488319-public/relaygate-desktop/$SHORT_SHA/SHA256SUMS.txt"
        gcloud storage cp release/SHA256SUMS.txt "gs://relayone-488319-public/relaygate-desktop/latest/SHA256SUMS.txt"
        gcloud storage ls "gs://relayone-488319-public/relaygate-desktop/$SHORT_SHA/"

artifacts:
  objects:
    location: 'gs://relayone-488319-public/relaygate-desktop/build-$BUILD_ID/'
    paths:
      - 'release/*.AppImage'
      - 'release/*.deb'
      - 'release/*.exe'
      - 'release/*-mac.zip'
      - 'release/*.dmg'
      - 'release/SHA256SUMS.txt'
