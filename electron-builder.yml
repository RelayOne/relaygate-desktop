appId: ai.relaygate.desktop
productName: RelayGate
copyright: Copyright © 2026 RelayGate

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json
  - assets/tray/**/*
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"

asar: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Network
  icon: assets/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  # This shared config ships zip ONLY (cross-compilable from Linux Cloud Build).
  # DMG target lives in electron-builder.mac.yml and is opt-in via
  # `npm run dist:mac` on a macOS host. See docs/MAC_BUILD.md.
  target:
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: assets/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  artifactName: ${productName}-${version}-${arch}-mac.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

publish: null
